# nginx.conf — 前端容器内 Nginx 配置
# 静态资源托管 + 反向代理后端 API 和 WebSocket

server {
    listen 80;
    server_name _;

    # 静态资源根目录（Vite build 产物）
    root /usr/share/nginx/html;
    index index.html;

    # 开启 gzip（JS/CSS 体积减少 60-70%）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── 静态资源长缓存（hash 文件名，永久缓存）────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── WebSocket 代理 → 后端 ─────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;   # WebSocket 长连接超时
        proxy_send_timeout 300s;
    }

    # ── REST API 代理 → 后端 ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    600s;   # 数据集生产任务最长可达 10 分钟，不能用 60s
        proxy_connect_timeout  10s;

        # SSE（Server-Sent Events）实时进度流：必须关闭缓冲，否则事件会积压后一次性推送
        proxy_buffering    off;
        proxy_cache        off;
        # 关闭 nginx 自己的缓冲区，让 FastAPI 的 StreamingResponse 实时透传
        proxy_set_header   X-Accel-Buffering no;

        # 大文件上传（音频/视频 base64 可能较大）
        client_max_body_size 50M;
    }

    # ── SPA fallback（React Router）────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # index.html 不缓存（保证部署后立即生效）
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── 安全头部 ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "strict-origin"   always;
}
