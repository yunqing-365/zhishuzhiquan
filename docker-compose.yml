services:

  # ── 后端：FastAPI + ChromaDB + SQLite ──────────────────────────────
  backend:
    build:
      context: ./ai-echo-backend
      dockerfile: Dockerfile.backend
    container_name: ai-echo-backend
    restart: unless-stopped
    environment:
      # 后端允许的跨域来源（前端地址）
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://frontend"
      # 后端监听地址
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "8000"
      # LLM 推理密钥（从宿主机 .env 注入）
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      # 副模型（多厂商投票）：留空则与主模型相同
      OPENAI_MODEL_B: "${OPENAI_MODEL_B:-}"
      OPENAI_BASE_URL_B: "${OPENAI_BASE_URL_B:-}"
      # JWT 认证密钥（生产必须设置强随机值）
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      JWT_EXPIRE_DAYS: "${JWT_EXPIRE_DAYS:-30}"
      # 可选：B2B API Key 鉴权（留空则关闭）
      API_KEY: "${API_KEY:-}"
      # 业务参数（留空使用代码默认值）
      PLATFORM_REVENUE_RATIO: "${PLATFORM_REVENUE_RATIO:-0.30}"
      CREATOR_REVENUE_RATIO:  "${CREATOR_REVENUE_RATIO:-0.70}"
      ENABLE_LLM_SAFETY:      "${ENABLE_LLM_SAFETY:-false}"
      # 存储路径（留空使用容器内默认路径 /app/data/）
      SQLITE_DB_PATH:              "${SQLITE_DB_PATH:-}"
      CREATOR_LEDGER_DB_PATH:      "${CREATOR_LEDGER_DB_PATH:-}"
      DATASET_OUTPUT_DIR:          "${DATASET_OUTPUT_DIR:-}"
      PIPELINE_STATE_DIR:          "${PIPELINE_STATE_DIR:-}"
      CHROMA_DB_DIR:               "${CHROMA_DB_DIR:-}"
    volumes:
      # 持久化 ChromaDB 向量库 + SQLite 历史记录
      - ai_echo_data:/app/data
    networks:
      - ai_echo_net
    # 不暴露到宿主机，只允许 frontend 容器访问
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5

  # ── 前端：Vite Build → Nginx ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # API 请求通过 Nginx 反向代理，走同源 /api/ 路径
        VITE_API_BASE_URL: "/api"
        VITE_WS_BASE_URL:  "/ws"
    container_name: ai-echo-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy   # 等后端健康检查通过再启动
    networks:
      - ai_echo_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

# ── 持久卷 ────────────────────────────────────────────────────────────
volumes:
  ai_echo_data:
    driver: local
    # 数据存储在宿主机 Docker 卷目录，容器删除后数据保留
    # 查看位置: docker volume inspect zhishuzhiquan_ai_echo_data

# ── 网络 ──────────────────────────────────────────────────────────────
networks:
  ai_echo_net:
    driver: bridge
