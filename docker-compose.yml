services:

  # ── 后端：FastAPI + ChromaDB + SQLite ──────────────────────────────
  backend:
    build:
      context: ./ai-echo-backend
      dockerfile: Dockerfile
    container_name: ai-echo-backend
    restart: unless-stopped
    environment:
      # 后端允许的跨域来源（前端地址）
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://frontend"
      # 后端监听地址
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "8000"
      # 可选：API Key 鉴权（留空则关闭）
      API_KEY: "${API_KEY:-}"
    volumes:
      # 持久化 ChromaDB 向量库 + SQLite 历史记录
      - ai_echo_data:/app/data
    networks:
      - ai_echo_net
    # 不暴露到宿主机，只允许 frontend 容器访问
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5

  # ── 前端：Vite Build → Nginx ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # API 请求通过 Nginx 反向代理，走同源 /api/ 路径
        VITE_API_BASE_URL: "/api"
        VITE_WS_BASE_URL:  "/ws"
    container_name: ai-echo-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy   # 等后端健康检查通过再启动
    networks:
      - ai_echo_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

# ── 持久卷 ────────────────────────────────────────────────────────────
volumes:
  ai_echo_data:
    driver: local
    # 数据存储在宿主机 Docker 卷目录，容器删除后数据保留
    # 查看位置: docker volume inspect zhishuzhiquan_ai_echo_data

# ── 网络 ──────────────────────────────────────────────────────────────
networks:
  ai_echo_net:
    driver: bridge
