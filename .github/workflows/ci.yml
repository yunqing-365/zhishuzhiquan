name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── 后端：Python pytest ──────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-echo-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-echo-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run pytest
        env:
          OPENAI_API_KEY: "sk-test-ci-placeholder"
          JWT_SECRET_KEY: "ci-test-secret-key-32-chars-long!!"
          SQLITE_DB_PATH: ":memory:"
          CREATOR_LEDGER_DB_PATH: ":memory:"
          DATASET_OUTPUT_DIR: "/tmp/ci-datasets"
          PIPELINE_STATE_DIR: "/tmp/ci-pipeline-state"
          CHROMA_DB_DIR: "/tmp/ci-chroma"
        run: |
          pytest ../test/test_pipeline_core.py \
                 ../test/test_scoring.py \
                 ../test/test_collision.py \
                 ../test/test_storage.py \
                 -v --tb=short \
                 --cov=. --cov-report=xml --cov-report=term-missing \
                 --ignore=../test/conftest.py

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ai-echo-backend/coverage.xml
          flags: backend

  # ─── 前端：ESLint + Vite build ──────────────────────────────────
  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_URL: "http://localhost:8000"
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ─── 合约：Hardhat 测试 ──────────────────────────────────────────
  contracts-test:
    name: Smart Contract Tests (Hardhat)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run Hardhat tests
        run: npx hardhat test test/AIEchoProtocol.test.js

  # ─── Docker 构建检查（不推送）───────────────────────────────────
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ai-echo-backend
          file: ai-echo-backend/Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
