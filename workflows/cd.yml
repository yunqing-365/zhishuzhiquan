name: CD · Deploy

on:
  push:
    branches: [main]
    # 只在后端或前端代码变更时触发，忽略文档/合约改动
    paths:
      - "src/**"
      - "ai-echo-backend/**"
      - "docker-compose.yml"
      - "Dockerfile"
      - "nginx.conf"
      - ".github/workflows/cd.yml"

# 同一时间只允许一个部署运行（防止并发部署冲突）
concurrency:
  group: deploy-production
  cancel-in-progress: false   # 部署不取消，等待前一个完成

jobs:

  # ════════════════════════════════════════════════════════════════
  # 推送镜像到 GitHub Container Registry (ghcr.io)
  # ════════════════════════════════════════════════════════════════
  push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 允许推送到 ghcr.io

    outputs:
      backend_tag:  ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
      sha_short:    ${{ steps.sha.outputs.sha_short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 后端镜像元数据 ──────────────────────────────────────────
      - name: Docker meta · backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 前端镜像元数据 ──────────────────────────────────────────
      - name: Docker meta · frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 构建并推送后端 ──────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./ai-echo-backend
          push: true
          tags:       ${{ steps.meta-backend.outputs.tags }}
          labels:     ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── 构建并推送前端 ──────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags:       ${{ steps.meta-frontend.outputs.tags }}
          labels:     ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_WS_BASE_URL=/ws
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ════════════════════════════════════════════════════════════════
  # SSH 部署到服务器
  # 需要在 GitHub Secrets 中配置：
  #   DEPLOY_HOST   — 服务器 IP 或域名
  #   DEPLOY_USER   — SSH 用户名（如 ubuntu）
  #   DEPLOY_KEY    — SSH 私钥（cat ~/.ssh/id_rsa）
  #   DEPLOY_DIR    — 服务器上的项目目录（如 /opt/zhishuzhiquan）
  # ════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: push-images
    environment: production   # 需要在 GitHub 仓库设置 Environments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_DIR }}

            # 拉取最新 compose 文件
            git pull origin main

            # 登录 ghcr.io（使用 GitHub Actions 临时 token）
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取新镜像
            docker compose pull

            # 滚动更新（先启新容器，健康检查通过后停旧容器）
            docker compose up -d --remove-orphans

            # 清理旧镜像（保留最近 2 个版本）
            docker image prune -f --filter "until=48h"

            echo "✓ 部署完成 SHA=${{ needs.push-images.outputs.sha_short }}"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            # 等待服务启动（最多 60s）
            for i in $(seq 1 12); do
              if curl -sf http://localhost/api/health > /dev/null 2>&1; then
                echo "✓ 健康检查通过（第 ${i} 次尝试）"
                exit 0
              fi
              echo "等待中... ($i/12)"
              sleep 5
            done
            echo "✗ 健康检查超时，部署可能失败"
            exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::部署失败！请检查服务器日志：docker compose logs"
