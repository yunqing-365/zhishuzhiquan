name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# 同一分支的新推送取消旧的 CI 运行，节省 runner 时间
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ════════════════════════════════════════════════════════════════
  # 后端：pytest 单元测试 + flake8 lint
  # ════════════════════════════════════════════════════════════════
  backend-test:
    name: Backend · pytest + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-echo-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-echo-backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio flake8

      - name: Lint (flake8)
        run: |
          # 只报错，不 warn（E501=行长, W503=换行风格 豁免）
          flake8 . \
            --exclude=__pycache__,tests,adapters/video_adapter.py \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E302,E303 \
            --count --statistics

      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --no-header \
            -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ai-echo-backend/.pytest_cache
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # 前端：ESLint + Vite build
  # ════════════════════════════════════════════════════════════════
  frontend-build:
    name: Frontend · ESLint + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build (Vite)
        run: npm run build
        env:
          VITE_API_BASE_URL: /api
          VITE_WS_BASE_URL: /ws

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 3

  # ════════════════════════════════════════════════════════════════
  # Docker 镜像构建验证（不推送，只确认能 build）
  # ════════════════════════════════════════════════════════════════
  docker-build:
    name: Docker · build check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]   # 测试通过后才构建

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./ai-echo-backend
          push: false
          tags: ai-echo-backend:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ai-echo-frontend:ci
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_WS_BASE_URL=/ws
          cache-from: type=gha
          cache-to:   type=gha,mode=max
